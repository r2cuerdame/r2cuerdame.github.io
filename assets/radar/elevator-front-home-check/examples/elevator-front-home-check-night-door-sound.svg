<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">밤 10시 엘리베이터 소리</title>
  <desc id="desc">밤 시간 엘리베이터 문 열림 알림과 발걸음이 집 안으로 들어오는지 확인하는 예시 장면</desc>
  <rect width="960" height="640" fill="#f0fdf4"/>
  <rect x="70" y="80" width="820" height="480" rx="34" fill="#ffffff" stroke="#16a34a" stroke-width="8"/>
  <rect x="146" y="176" width="288" height="300" rx="26" fill="#0f172a" opacity=".94"/>
  <rect x="648" y="164" width="174" height="318" rx="24" fill="#1d4ed8" opacity=".92"/>
  <path d="M634 236c-46 16-76 44-94 84 18 42 50 70 98 88" fill="none" stroke="#22c55e" stroke-width="18" stroke-linecap="round" stroke-dasharray="2 34"/>
  <path d="M584 216c-70 24-118 76-140 132 24 58 72 104 146 130" fill="none" stroke="#86efac" stroke-width="14" stroke-linecap="round" stroke-dasharray="2 32"/>
