  <text x="736" y="514" font-family="Arial, sans-serif" font-size="34" text-anchor="middle" fill="#1e3a8a" font-weight="700">문 열림음</text>
  <text x="480" y="120" font-family="Arial, sans-serif" font-size="38" text-anchor="middle" fill="#14532d" font-weight="800">한 번의 크기보다 반복 리듬</text>
