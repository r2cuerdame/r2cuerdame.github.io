<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">엘리베이터 앞 택배 머무름</title>
  <desc id="desc">저녁 시간 택배와 배달 동선이 엘리베이터 앞과 현관 앞을 막는지 확인하는 예시 장면</desc>
  <rect width="960" height="640" fill="#fdf2f8"/>
  <rect x="72" y="80" width="816" height="480" rx="34" fill="#ffffff" stroke="#db2777" stroke-width="8"/>
  <rect x="124" y="176" width="270" height="300" rx="24" fill="#111827" opacity=".9"/>
  <rect x="660" y="164" width="174" height="318" rx="24" fill="#2563eb" opacity=".92"/>
  <rect x="452" y="292" width="72" height="58" rx="8" fill="#f59e0b"/><rect x="532" y="316" width="82" height="64" rx="8" fill="#fbbf24"/><rect x="474" y="366" width="96" height="70" rx="8" fill="#d97706"/>
  <path d="M418 330h226" stroke="#f472b6" stroke-width="18" stroke-linecap="round" stroke-dasharray="16 26"/>
  <text x="260" y="514" font-family="Arial, sans-serif" font-size="34" text-anchor="middle" fill="#111827" font-weight="700">내 문 앞</text>
  <text x="747" y="514" font-family="Arial, sans-serif" font-size="34" text-anchor="middle" fill="#1e3a8a" font-weight="700">엘리베이터</text>
  <text x="480" y="120" font-family="Arial, sans-serif" font-size="38" text-anchor="middle" fill="#831843" font-weight="800">택배·배달이 어디에 멈추는가</text>
</svg>
