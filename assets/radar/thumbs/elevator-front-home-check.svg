  <rect x="720" y="142" width="250" height="346" rx="30" fill="#dbeafe" stroke="#2563eb" stroke-width="8"/>
  <line x1="480" y1="318" x2="720" y2="318" stroke="#64748b" stroke-width="22" stroke-linecap="round"/>
  <circle cx="566" cy="278" r="34" fill="#ff5a1f"/>
