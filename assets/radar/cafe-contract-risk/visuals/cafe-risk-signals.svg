<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 500" role="img" aria-label="카페 계약 전 위험 신호 5가지 인포그래픽">
<style>.title{font:900 34px system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;fill:#102033}.desc{font:600 17px system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;fill:#475569}.num{font:900 18px system-ui;fill:#fff}.card-title{font:900 20px system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;fill:#102033}.card-text{font:650 15px system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;fill:#334155}</style>
<rect width="980" height="500" rx="28" fill="#f8fafc"/>
<rect x="26" y="26" width="928" height="448" rx="24" fill="#fff" stroke="#dbe3ee"/>
<text x="42" y="74" class="title">카페 계약 전 먼저 지울 위험 신호 5개</text>
<text x="42" y="108" class="desc">좋아 보이는 이유보다, 계약 전에 틀릴 수 있는 가정을 먼저 지웁니다.</text>
<g transform="translate(42 130)"><rect width="270" height="132" rx="22" fill="#ccfbf1" stroke="#dbe3ee"/><circle cx="38" cy="40" r="20" fill="#102033"/><text x="38" y="47" text-anchor="middle" class="num">1</text><text x="72" y="42" class="card-title">점포당 보정 유동</text><text x="24" y="84" class="card-text">사람 수보다 한 점포가 나눠 가질 수요</text></g><g transform="translate(354 130)"><rect width="270" height="132" rx="22" fill="#dbeafe" stroke="#dbe3ee"/><circle cx="38" cy="40" r="20" fill="#102033"/><text x="38" y="47" text-anchor="middle" class="num">2</text><text x="72" y="42" class="card-title">경쟁밀도</text><text x="24" y="84" class="card-text">커피·음료 점포 수와 유사 업종 압력</text></g><g transform="translate(666 130)"><rect width="270" height="132" rx="22" fill="#ffedd5" stroke="#dbe3ee"/><circle cx="38" cy="40" r="20" fill="#102033"/><text x="38" y="47" text-anchor="middle" class="num">3</text><text x="72" y="42" class="card-title">폐업·교체 압력</text><text x="24" y="84" class="card-text">빈 값은 0이 아니라 미기록 가능성</text></g><g transform="translate(198 305)"><rect width="270" height="132" rx="22" fill="#ede9fe" stroke="#dbe3ee"/><circle cx="38" cy="40" r="20" fill="#102033"/><text x="38" y="47" text-anchor="middle" class="num">4</text><text x="72" y="42" class="card-title">시간대 적합성</text><text x="24" y="84" class="card-text">점심·오후·퇴근·주말 중 어디형인지</text></g><g transform="translate(510 305)"><rect width="270" height="132" rx="22" fill="#fce7f3" stroke="#dbe3ee"/><circle cx="38" cy="40" r="20" fill="#102033"/><text x="38" y="47" text-anchor="middle" class="num">5</text><text x="72" y="42" class="card-title">매물 앞 동선</text><text x="24" y="84" class="card-text">구 평균이 아니라 전면 동선·가시성</text></g>
</svg>
