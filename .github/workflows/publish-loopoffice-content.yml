name: Publish LoopOffice Site Content
run-name: Publish LoopOffice Site Content dry=${{ inputs.dry_run }} no_push=${{ inputs.no_push }}

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate candidate only. Keep true until LoopOffice readiness proof is complete."
        required: true
        default: true
        type: boolean
      no_push:
        description: "Build and commit locally but skip push when dry_run is false."
        required: true
        default: false
        type: boolean
      proof_branch:
        description: "Branch that receives no-push readiness proof output. Ignored for dry-run and live publish."
        required: true
        default: "loopoffice-publisher-proof"
        type: string

permissions:
  contents: write

concurrency:
  group: loopoffice-publisher
  cancel-in-progress: false

jobs:
  publish-shopping-pick:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git identity
        run: |
          git config user.name "LoopOffice Publisher"
          git config user.email "publisher@loopoffice.local"

      - name: Publish or dry-run shopping pick
        shell: bash
        run: |
          set -euo pipefail
          args=()
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ "${{ inputs.no_push }}" == "true" ]]; then
            args+=(--no-push)
          fi
          python scripts/publish_next_blog_autopost_deal.py "${args[@]}" | tee publisher-shopping-result.json
          python scripts/publish_next_shorts_shopping_pick.py "${args[@]}" | tee publisher-shorts-result.json
          python - <<'PY'
          import json
          from pathlib import Path
          out = {
              "shopping": json.loads(Path("publisher-shopping-result.json").read_text(encoding="utf-8")),
              "shorts": json.loads(Path("publisher-shorts-result.json").read_text(encoding="utf-8")),
          }
          Path("publisher-result.json").write_text(json.dumps(out, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(json.dumps(out, ensure_ascii=False, indent=2))
          PY

      - name: Upload publisher result
        uses: actions/upload-artifact@v4
        with:
          name: publisher-result
          path: |
            publisher-result.json
            publisher-shopping-result.json
            publisher-shorts-result.json

      - name: Push no-push readiness proof branch
        if: ${{ inputs.dry_run == false && inputs.no_push == true }}
        shell: bash
        run: |
          set -euo pipefail
          proof_branch="${{ inputs.proof_branch }}"
          if [[ ! "$proof_branch" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "Unsafe proof branch: $proof_branch" >&2
            exit 2
          fi
          if [[ "$proof_branch" == "main" || "$proof_branch" == "master" ]]; then
            echo "Refusing to use protected publish branch as proof branch: $proof_branch" >&2
            exit 2
          fi
          git status --short
          git rev-parse HEAD > publisher-proof-head.txt
          git push --force-with-lease origin "HEAD:refs/heads/${proof_branch}"
